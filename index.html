<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="brand-panel" aria-label="Welcome">
        <div class="brand-mark">N</div>
        <div>
          <p class="eyebrow">Secure workspace</p>
          <h1>Welcome back</h1>
          <p class="intro">
            Sign in to continue managing your dashboard, projects, and account settings.
          </p>
        </div>
      </section>

      <section class="form-panel" aria-label="Login form">
        <form class="login-form" id="loginForm" novalidate>
          <div class="form-header">
            <p class="eyebrow">Member login</p>
            <h2>Sign in</h2>
          </div>

          <label class="field">
            <span>Email address</span>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
            <small class="error-message" id="emailError"></small>
          </label>

          <label class="field">
            <span>Password</span>
            <div class="password-row">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                minlength="6"
                required
              />
              <button
                class="icon-button"
                type="button"
                id="togglePassword"
                aria-label="Show password"
                title="Show password"
              >
                <span aria-hidden="true">○</span>
              </button>
            </div>
            <small class="error-message" id="passwordError"></small>
          </label>

          <div class="form-options">
            <label class="remember">
              <input type="checkbox" id="remember" name="remember" />
              <span>Remember me</span>
            </label>
            <a href="#" aria-label="Reset your password">Forgot password?</a>
          </div>

          <button class="primary-button" type="submit">Sign in</button>
          <p class="status-message" id="statusMessage" role="status" aria-live="polite"></p>

          <p class="signup-text">
            New here?
            <a href="#">Create an account</a>
          </p>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
